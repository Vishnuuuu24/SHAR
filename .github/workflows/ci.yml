name: Dataset-free portability checks

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  portable-python-312:
    name: Ubuntu/Python 3.12 portability (not frozen-env evidence)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Resolve the project on Linux for portability only
        run: |
          python -m pip install --disable-pip-version-check setuptools==83.0.0 .
          python -m pip freeze --all

      - name: Run dataset-free repository verification
        run: |
          python scripts/check_repository.py

      - name: Scope notice
        if: always()
        run: |
          echo "This Ubuntu job is a portability check with resolver-selected transitive wheels. It is not frozen-environment evidence and does not access datasets, validate UCF mappings, validate Apple MPS, train models, or produce research evidence."
